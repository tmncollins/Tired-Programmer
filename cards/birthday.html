<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎂</text></svg>'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
    background-image: url("background.jpg");
    background-size: cover;        
    background-position: center;  
    background-repeat: no-repeat;  
    background-attachment: fixed;          
    display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .card {
        background: white;
        width: 90%;
        max-width: 700px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    .content {
        padding: 40px;
    }

    h1 {
        color: #035414;
        font-size: 3rem;
        margin-bottom: 15px;
    }

    .message {
        color: #555;
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 25px;
        margin-left: 25px;
        margin-right: 25px;
    }

    .signature {
        font-size: 1.3rem;
        color: #ff4d6d;
        font-weight: bold;
    }

    .balloons {
        font-size: 2rem;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<div class="card">
        <img src="helmet_garden.png" alt="Birthday Photo" style="width:100%;object-    </div>

    <div class="content">

        <h1>Happy Birthday!</h1>

        <p class="message">
            Wishing you a Happy Birthday and the very best of luck for exams!<br>
	    Commando Tedda is growing you a special helmet garden.
        </p>

        <div class="signature">
        </div>
    </div>
</div>

</body>
</html>
